<style>
:root {
  --parchment: #f5ead6;
  --parchment-light: #faf4e8;
  --ink: #2a1f14;
  --accent: #e8a0b4;
  --accent-light: #f5d5df;
  --muted: #8a7a6a;
  --danger: #c44040;
  --font-display: 'Bebas Neue', 'Impact', sans-serif;
  --font-body: 'Crimson Text', 'Georgia', serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--ink); }
body {
  max-width: 520px; margin: 0 auto; min-height: 100vh; min-height: 100dvh;
  background: var(--parchment); color: var(--ink);
  font-family: var(--font-body); font-size: 15px; line-height: 1.4;
  border-left: 3px solid var(--ink); border-right: 3px solid var(--ink);
  -webkit-font-smoothing: antialiased;
}
input, textarea, select, button { font-family: inherit; font-size: inherit; color: inherit; }
input:focus, textarea:focus, select:focus { outline: 2px solid var(--accent); outline-offset: -2px; }
button { -webkit-tap-highlight-color: transparent; }
@keyframes fadeSlideIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
@keyframes pulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.08); } }
@keyframes spinIn { from { transform:rotate(720deg) scale(0.3); } to { transform:rotate(0) scale(1); } }

/* Header */
.app-header { text-align:center; padding:20px 16px 14px; border-bottom:3px solid var(--ink); background:linear-gradient(180deg, var(--accent-light) 0%, var(--parchment) 100%); }
.app-title { font-family:var(--font-display); font-size:32px; letter-spacing:3px; line-height:1; }
.app-subtitle { font-family:var(--font-display); font-size:10px; text-transform:uppercase; letter-spacing:4px; color:var(--muted); margin-top:4px; }
.app-odds { display:inline-flex; gap:12px; margin-top:10px; font-size:12px; color:var(--muted); }
.app-odds .dot { color:var(--accent); }

/* Tab bar */
.tab-bar { display:flex; border-bottom:3px solid var(--ink); }
.tab-btn { flex:1; padding:10px 4px; border:none; cursor:pointer; font-family:var(--font-display); font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:1.5px; transition:all 0.2s; background:transparent; color:var(--ink); border-bottom:3px solid var(--ink); }
.tab-btn.active { background:var(--ink); color:var(--parchment); border-bottom:none; }

/* Content */
.content { padding:16px; padding-bottom:40px; }
.hidden { display:none !important; }

/* Sub-tabs */
.sub-tabs { display:flex; gap:6px; margin-bottom:14px; flex-wrap:wrap; }
.sub-btn { padding:6px 14px; border:2px solid var(--ink); cursor:pointer; font-family:var(--font-body); font-size:12px; font-weight:400; background:transparent; color:var(--ink); border-radius:20px; transition:all 0.15s; }
.sub-btn.active { background:var(--accent); font-weight:700; }

/* Generic form elements */
.field { margin-bottom:8px; }
.field-label { font-family:var(--font-display); font-size:11px; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); display:block; margin-bottom:3px; }
.field-input, .field-textarea { width:100%; padding:8px 10px; border:2px solid var(--ink); border-radius:4px; font-family:var(--font-body); font-size:14px; background:var(--parchment-light); color:var(--ink); }
.field-textarea { resize:vertical; min-height:44px; }

/* Buttons */
.btn { padding:8px 16px; border:2px solid var(--ink); cursor:pointer; font-family:var(--font-display); font-size:13px; font-weight:700; border-radius:4px; transition:all 0.15s; text-transform:uppercase; letter-spacing:1px; }
.btn:disabled { opacity:0.4; cursor:default; }
.btn-primary { background:var(--accent); color:var(--ink); }
.btn-dark { background:var(--ink); color:var(--parchment); }
.btn-danger { background:var(--danger); color:var(--parchment); }
.btn-link { background:none; border:2px dashed var(--muted); border-radius:4px; padding:4px 12px; cursor:pointer; font-family:var(--font-body); font-size:12px; color:var(--muted); }
.btn-link-danger { background:none; border:2px dashed var(--danger); border-radius:4px; padding:4px 12px; cursor:pointer; font-family:var(--font-body); font-size:12px; color:var(--danger); }

/* Cards */
.card { border:2px solid var(--ink); border-radius:6px; margin-bottom:12px; background:var(--parchment-light); overflow:hidden; }
.card-header { display:flex; align-items:center; justify-content:space-between; padding:10px 14px; cursor:pointer; transition:background 0.15s; }
.card-header.expanded { background:var(--accent); }
.card-header .name { font-family:var(--font-display); font-size:16px; font-weight:700; }
.card-header .meta { font-size:11px; color:var(--muted); font-family:var(--font-body); }
.card-header .arrow { font-size:18px; transition:transform 0.2s; display:inline-block; }
.card-header.expanded .arrow { transform:rotate(180deg); }
.card-body { padding:14px; border-top:2px solid var(--ink); }

/* Trait row */
.trait-row { display:flex; gap:4px; margin-bottom:4px; align-items:center; }
.trait-status { width:30px; height:30px; border:2px solid var(--ink); border-radius:4px; cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center; font-weight:700; color:var(--ink); flex-shrink:0; transition:background 0.15s; }
.trait-status[data-status="prevalent"] { background:var(--accent); }
.trait-status[data-status="temporary"] { background:var(--accent-light); }
.trait-status[data-status="default"], .trait-status[data-status="empty"] { background:var(--parchment); }
.trait-input { flex:1; padding:5px 8px; border:2px solid var(--ink); border-radius:4px; font-family:var(--font-body); font-size:13px; background:var(--parchment); color:var(--ink); min-width:0; }
.trait-cat { width:46px; padding:5px 2px; border:2px solid var(--ink); border-radius:4px; font-family:var(--font-display); font-size:12px; background:var(--parchment); color:var(--ink); text-align:center; text-transform:uppercase; letter-spacing:1px; }
.trait-remove { background:none; border:none; cursor:pointer; font-size:14px; color:var(--danger); font-weight:700; padding:0 4px; }

/* Boxes */
.box { background:var(--parchment-light); border:2px solid var(--ink); border-radius:6px; padding:12px; margin-bottom:12px; }
.box-inner { background:var(--parchment); border:2px solid var(--ink); border-radius:6px; padding:12px; margin-bottom:12px; }
.box-title { font-family:var(--font-display); font-size:11px; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); margin-bottom:8px; }

/* Result display */
.result-box { margin-top:16px; padding:16px; border:3px solid var(--ink); border-radius:8px; background:var(--accent-light); text-align:center; animation:fadeSlideIn 0.3s ease-out; }
.result-dice { display:inline-flex; align-items:center; justify-content:center; width:56px; height:56px; border-radius:6px; background:var(--ink); color:var(--parchment); font-family:var(--font-display); font-size:28px; font-weight:700; box-shadow:2px 3px 0 rgba(0,0,0,0.2); animation:spinIn 0.4s cubic-bezier(.2,1,.3,1); }
.result-outcome { font-family:var(--font-display); font-size:22px; font-weight:700; color:var(--ink); margin-top:8px; }
.result-pick { font-family:var(--font-body); font-size:14px; color:var(--muted); margin-top:4px; }
.result-doubles { font-family:var(--font-display); font-size:18px; font-weight:700; color:var(--danger); margin-top:6px; animation:pulse 0.6s ease-in-out 2; }
.result-context { font-family:var(--font-body); font-size:12px; color:var(--muted); margin-top:8px; }

/* Tables tab */
.combo-pills { display:flex; flex-wrap:wrap; gap:6px; }
.combo-pill { padding:6px 12px; border:2px solid var(--muted); border-radius:20px; cursor:pointer; font-family:var(--font-body); font-size:12px; font-weight:400; background:transparent; color:var(--ink); transition:all 0.15s; }
.combo-pill.selected { border-color:var(--ink); background:var(--accent); font-weight:700; }
.table-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
.table-grid-btn { padding:10px 8px; border:2px solid var(--ink); border-radius:6px; cursor:pointer; font-family:var(--font-display); font-size:13px; font-weight:700; background:var(--parchment); color:var(--ink); transition:background 0.15s; text-align:center; }
.table-grid-btn:hover, .table-grid-btn:active { background:var(--accent); }
.table-result-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.table-result-row:last-child { margin-bottom:0; }
.table-result-name { font-family:var(--font-display); font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); }
.table-result-val { font-family:var(--font-display); font-size:18px; font-weight:700; color:var(--ink); }

/* Journal */
.journal-entry { padding:10px; margin-bottom:6px; border:2px solid var(--ink); border-radius:6px; animation:fadeSlideIn 0.25s ease-out; }
.journal-entry:nth-child(odd) { background:var(--parchment-light); }
.journal-entry:nth-child(even) { background:var(--parchment); }
.journal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; }
.journal-type { font-family:var(--font-display); font-size:12px; font-weight:700; color:var(--ink); }
.journal-time { font-family:var(--font-body); font-size:11px; color:var(--muted); }
.journal-char { font-family:var(--font-body); font-size:12px; color:var(--muted); margin-bottom:2px; }
.journal-question { font-family:var(--font-body); font-size:12px; font-style:italic; color:var(--ink); margin-bottom:2px; }
.journal-detail { font-family:var(--font-body); font-size:13px; color:var(--ink); }
.journal-ooo { font-family:var(--font-body); font-size:11px; color:var(--muted); margin-top:4px; }
.journal-note { font-family:var(--font-display); font-size:12px; color:var(--danger); margin-top:4px; }
.journal-empty { text-align:center; padding:40px; color:var(--muted); font-style:italic; }

/* Checkbox & radio styling */
.check-label { font-family:var(--font-body); font-size:13px; cursor:pointer; display:inline-flex; align-items:center; gap:5px; }
.check-label-sm { font-family:var(--font-body); font-size:12px; color:var(--muted); cursor:pointer; display:inline-flex; align-items:center; gap:4px; }

/* Group action rows */
.ga-row { display:flex; gap:6px; margin-bottom:6px; align-items:flex-end; }
.ga-row .field { flex:1; margin-bottom:0; }
.ga-who { padding:8px 6px; border:2px solid var(--ink); border-radius:4px; font-family:var(--font-body); font-size:12px; background:var(--parchment-light); width:100px; }

/* Flex helpers */
.flex-between { display:flex; justify-content:space-between; align-items:center; }
.flex-gap { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.flex-gap-sm { display:flex; gap:6px; align-items:center; }
.mt-sm { margin-top:8px; }
.mt-md { margin-top:12px; }
.mb-sm { margin-bottom:8px; }
.mb-md { margin-bottom:12px; }
.w-full { width:100%; }
</style>
</head>
<body>

<div class="app-header">
  <div class="app-title">TRIPLE-O</div>
  <div class="app-subtitle">Player Character Emulator</div>
  <div class="app-odds">
    <span>4–6 Obvious</span><span class="dot">·</span>
    <span>2–3 Option</span><span class="dot">·</span>
    <span>1 Odd</span>
  </div>
</div>

<div class="tab-bar">
  <button class="tab-btn active" data-tab="characters" onclick="switchTab('characters')">Characters</button>

// ══════════════════════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════════════════════

let state = {
  characters: [{ id: Date.now(), name: "", details: "", situation: "", traits: [{ text: "", category: "CL", status: "empty" }] }],
  partyTraits: [],
  journal: [],
  expandedChar: null,
  currentSub: "actions",
  currentTableType: "spark",
  comboSelected: [],
  entryId: 0
};

function nextId() { return ++state.entryId; }
function rollD6() { return Math.floor(Math.random() * 6) + 1; }
function rollD66() { const a=rollD6(),b=rollD6(); return {key:a*10+b, display:`${a}${b}`}; }
function tripleOResult(v) { return v>=4?"THE OBVIOUS":v>=2?"THE OPTION":"THE ODD"; }
function ts() { return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'}); }

// ══════════════════════════════════════════════════════════════════════════════
// PERSISTENCE
// ══════════════════════════════════════════════════════════════════════════════

const SAVE_KEY = "triple_o_state";
let saveTimeout = null;

function saveState() {
  if (saveTimeout) clearTimeout(saveTimeout);
  saveTimeout = setTimeout(() => {
    try {
      localStorage.setItem(SAVE_KEY, JSON.stringify({
        characters: state.characters,
        partyTraits: state.partyTraits,
        journal: state.journal,
        entryId: state.entryId
      }));
    } catch(e) { console.warn("Save failed:", e); }
  }, 600);
}

function loadState() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (raw) {
      const d = JSON.parse(raw);
      if (d.characters?.length) state.characters = d.characters;
      if (d.partyTraits) state.partyTraits = d.partyTraits;
      if (d.journal) state.journal = d.journal;
      if (d.entryId) state.entryId = d.entryId;
    }
  } catch(e) { console.log("No saved data, starting fresh."); }
}

// ══════════════════════════════════════════════════════════════════════════════
// TABS
// ══════════════════════════════════════════════════════════════════════════════

function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
  ['characters','gameplay','tables','journal'].forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('hidden', t !== name);
  });
  if (name === 'gameplay') refreshCharSelects();
  if (name === 'journal') renderJournal();
  if (name === 'tables') renderTableTab();
}

function switchSub(name) {
  state.currentSub = name;
  document.querySelectorAll('[data-sub]').forEach(b => b.classList.toggle('active', b.dataset.sub === name));
  document.getElementById('sub-actions').classList.toggle('hidden', name === 'group');
  document.getElementById('sub-group').classList.toggle('hidden', name !== 'group');
  document.getElementById('question-field').classList.toggle('hidden', name !== 'questions');
  document.getElementById('gp-result').innerHTML = '';
  updateLabels();
}

function updateLabels() {
  const checks = document.getElementById('checks-mode').checked;
  const sub = state.currentSub;
  const label = document.getElementById('triple-o-label');
  if (checks) label.textContent = "Define Three Outcomes";
  else if (sub === 'questions') label.textContent = "Define Three Answers";
  else label.textContent = "Define Three Actions";
  // Update placeholders
  const ph = checks ? ["Most likely outcome...","Somewhat likely outcome...","Least likely outcome..."]
    : sub === 'questions' ? ["Most likely answer...","Alternative answer...","Unexpected answer..."]
    : ["Most predictable action...","Alternative action...","Unusual action..."];
  document.getElementById('gp-obvious').placeholder = ph[0];
  document.getElementById('gp-option').placeholder = ph[1];
  document.getElementById('gp-odd').placeholder = ph[2];
}

// ══════════════════════════════════════════════════════════════════════════════
// CHARACTERS
// ══════════════════════════════════════════════════════════════════════════════

function renderCharacters() {
  // Party traits
  const ptList = document.getElementById('party-traits-list');
  ptList.innerHTML = state.partyTraits.map((pt, i) => `
    <div style="display:flex;gap:6px;margin-bottom:4px;align-items:center">
      <input class="trait-input" style="flex:1" value="${esc(pt)}" oninput="state.partyTraits[${i}]=this.value;saveState()" placeholder="Party trait...">
      <button class="trait-remove" onclick="state.partyTraits.splice(${i},1);renderCharacters();saveState()">✕</button>
    </div>
  `).join('');

  // Characters
  const list = document.getElementById('characters-list');
  list.innerHTML = state.characters.map((c, ci) => {
    const exp = state.expandedChar === c.id;
    const traitCount = c.traits.filter(t=>t.text).length;
    return `
    <div class="card">
      <div class="card-header ${exp?'expanded':''}" onclick="toggleChar(${c.id})">
        <span class="name">${esc(c.name)||'Unnamed Character'}</span>
        <div class="flex-gap-sm">
          <span class="meta">${traitCount} traits</span>
          <span class="arrow">▾</span>
        </div>
      </div>
      ${exp ? `<div class="card-body">
        <div class="field"><label class="field-label">Name</label><input class="field-input" value="${esc(c.name)}" oninput="state.characters[${ci}].name=this.value;updateCardName(${c.id},this.value);saveState()" placeholder="Character name..."></div>
        <div class="field"><label class="field-label">Details</label><textarea class="field-input field-textarea" oninput="state.characters[${ci}].details=this.value;saveState()" placeholder="Appearance, class, background...">${esc(c.details)}</textarea></div>
        <div class="field"><label class="field-label">Current Situation</label><textarea class="field-input field-textarea" oninput="state.characters[${ci}].situation=this.value;saveState()" placeholder="Conditions, morale, recent events...">${esc(c.situation)}</textarea></div>
        <div class="box-title mt-md">Traits</div>
        ${c.traits.map((t, ti) => `
          <div class="trait-row">
            <button class="trait-status" data-status="${t.status}" title="${TRAIT_STATUS_NAMES[t.status]}" onclick="cycleTrait(${ci},${ti})">${TRAIT_STATUS_LABELS[t.status]}</button>
            <input class="trait-input" value="${esc(t.text)}" oninput="state.characters[${ci}].traits[${ti}].text=this.value;saveState()" placeholder="Trait snippet...">
            <input class="trait-cat" value="${esc(t.category)}" maxlength="3" oninput="state.characters[${ci}].traits[${ti}].category=this.value.toUpperCase().slice(0,3);this.value=state.characters[${ci}].traits[${ti}].category;saveState()" placeholder="CL">
            <button class="trait-remove" onclick="state.characters[${ci}].traits.splice(${ti},1);renderCharacters();saveState()">✕</button>
          </div>
        `).join('')}
        <div class="flex-between mt-sm">
          <button class="btn-link" onclick="state.characters[${ci}].traits.push({text:'',category:'',status:'empty'});renderCharacters();saveState()">+ Trait</button>
          <button class="btn-link-danger" onclick="removeChar(${ci})">Remove Character</button>
        </div>
      </div>` : ''}
    </div>`;
  }).join('');
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function toggleChar(id) {
  state.expandedChar = state.expandedChar === id ? null : id;
  renderCharacters();
}

function updateCardName(id, name) {
  const card = document.querySelector(`.card-header[onclick="toggleChar(${id})"] .name`);
  if (card) card.textContent = name || 'Unnamed Character';
}

function addCharacter() {
  const c = { id: Date.now(), name: "", details: "", situation: "", traits: [{ text: "", category: "CL", status: "empty" }] };
  state.characters.push(c);
  renderCharacters();
  saveState();
}

function removeChar(ci) {
  const id = state.characters[ci].id;
  state.characters.splice(ci, 1);
  if (state.expandedChar === id) state.expandedChar = null;
  renderCharacters();
  saveState();
}

function addPartyTrait() {
  state.partyTraits.push("");
  renderCharacters();
  saveState();
}

function cycleTrait(ci, ti) {
  const t = state.characters[ci].traits[ti];
  const idx = TRAIT_STATUSES.indexOf(t.status);
  t.status = TRAIT_STATUSES[(idx + 1) % TRAIT_STATUSES.length];
  renderCharacters();
  saveState();
}

// ══════════════════════════════════════════════════════════════════════════════
// GAMEPLAY
// ══════════════════════════════════════════════════════════════════════════════

function refreshCharSelects() {
  const opts = '<option value="">Select / Who?</option>' + state.characters.map(c =>
    `<option value="${c.id}">${esc(c.name)||'Unnamed'}</option>`
  ).join('');
  document.getElementById('gp-char-select').innerHTML = opts;
  ['ga-1-who','ga-2-who','ga-3-who'].forEach(id => {
    document.getElementById(id).innerHTML = '<option value="">Who?</option>' + state.characters.map(c =>
      `<option value="${c.id}">${esc(c.name)||'Unnamed'}</option>`
    ).join('');
  });
}

function getCharName(id) {
  const c = state.characters.find(x => x.id == id);
  return c ? (c.name || 'Unnamed') : 'Unknown';
}

function doTripleOCheck() {
  const obvious = document.getElementById('gp-obvious').value;
  const option = document.getElementById('gp-option').value;
  const odd = document.getElementById('gp-odd').value;
  const question = document.getElementById('gp-question').value;
  const charId = document.getElementById('gp-char-select').value;
  const dd = document.getElementById('gp-doubledown').checked;
  const checks = document.getElementById('checks-mode').checked;
  const sub = state.currentSub;
  const charName = getCharName(charId);

  if (!obvious) return;

  const container = document.getElementById('gp-result');

  if (dd) {
    const d1=rollD6(), d2=rollD6(), doubles = d1===d2;
    container.innerHTML = `
      <div class="result-box">
        <div style="display:flex;justify-content:center;gap:10px;margin-bottom:10px">
          <span class="result-dice">${d1}</span><span class="result-dice">${d2}</span>
        </div>
        <div class="result-pick">Pick your favorite: [${d1}] = ${tripleOResult(d1)} or [${d2}] = ${tripleOResult(d2)}</div>
        ${doubles ? '<div class="result-doubles">★ DOUBLES! ★</div>' : ''}
        <div class="result-context">${obvious ? 'Obvious: '+esc(obvious) : ''}${option ? ' · Option: '+esc(option) : ''}${odd ? ' · Odd: '+esc(odd) : ''}</div>
      </div>`;
    addJournal({
      type: `Triple-O ${checks?'Check (Resolution)':'Check'} — Double-Down`,
      character: charName,
      question: sub==='questions' ? question : null,
      detail: `Rolled 2d6: [${d1}] [${d2}]${doubles?' — DOUBLES!':''}`,
      obvious, option, odd,
      note: doubles ? 'Doubles rolled! Consider promoting a trait or adding a new one.' : null
    });
  } else {
    const d = rollD6(), outcome = tripleOResult(d);
    container.innerHTML = `
      <div class="result-box">
        <div style="display:flex;justify-content:center;margin-bottom:10px"><span class="result-dice">${d}</span></div>
        <div class="result-outcome">${outcome}</div>
        <div class="result-context">${obvious ? 'Obvious: '+esc(obvious) : ''}${option ? ' · Option: '+esc(option) : ''}${odd ? ' · Odd: '+esc(odd) : ''}</div>
      </div>`;
    addJournal({
      type: `Triple-O ${checks?'Check (Resolution)':'Check'}`,
      character: charName,
      question: sub==='questions' ? question : null,
      detail: `Rolled 1d6: [${d}] → ${outcome}`,
      obvious, option, odd
    });
  }
}

function doGroupRoll() {
  const texts = [
    document.getElementById('ga-1-text').value,
    document.getElementById('ga-2-text').value,
    document.getElementById('ga-3-text').value
  ];
  if (!texts[0]) return;

  const mode = document.querySelector('input[name="ga-mode"]:checked').value;
  const dd = document.getElementById('ga-doubledown').checked;
  let obvious = texts[0], option = texts[1], odd = texts[2];

  const container = document.getElementById('gp-result');

  if (mode === 'roll') {
    const rolls = texts.map((t,i) => ({text:t, roll:rollD6(), idx:i}));
    rolls.sort((a,b) => b.roll - a.roll);
    obvious = rolls[0].text; option = rolls[1].text; odd = rolls[2].text;
    addJournal({
      type: 'Group Action — Ranking Roll',
      detail: rolls.map(r => `"${r.text||'(blank)'}" rolled [${r.roll}]`).join(', '),
      obvious, option, odd
    });
  }

  if (dd) {
    const d1=rollD6(), d2=rollD6(), doubles=d1===d2;
    container.innerHTML = `
      <div class="result-box">
        <div style="display:flex;justify-content:center;gap:10px;margin-bottom:10px">
          <span class="result-dice">${d1}</span><span class="result-dice">${d2}</span>
        </div>
        <div class="result-pick">Pick your favorite: [${d1}] = ${tripleOResult(d1)} or [${d2}] = ${tripleOResult(d2)}</div>
        ${doubles ? '<div class="result-doubles">★ DOUBLES! Consider a Party Trait. ★</div>' : ''}
        <div class="result-context">${obvious?'Obvious: '+esc(obvious):''}${option?' · Option: '+esc(option):''}${odd?' · Odd: '+esc(odd):''}</div>
      </div>`;
    addJournal({
      type: 'Triple-O Check — Group Action (Double-Down)',
      detail: `Rolled 2d6: [${d1}] [${d2}]${doubles?' — DOUBLES!':''}`,
      obvious, option, odd,
      note: doubles ? 'Doubles! Consider adding a Party Trait.' : null
    });
  } else {
    const d=rollD6(), outcome=tripleOResult(d);
    container.innerHTML = `
      <div class="result-box">
        <div style="display:flex;justify-content:center;margin-bottom:10px"><span class="result-dice">${d}</span></div>
        <div class="result-outcome">${outcome}</div>
        <div class="result-context">${obvious?'Obvious: '+esc(obvious):''}${option?' · Option: '+esc(option):''}${odd?' · Odd: '+esc(odd):''}</div>
      </div>`;
    addJournal({
      type: 'Triple-O Check — Group Action',
      detail: `Rolled 1d6: [${d}] → ${outcome}`,
      obvious, option, odd
    });
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// TABLES
// ══════════════════════════════════════════════════════════════════════════════

function switchTableType(type) {
  state.currentTableType = type;
  state.comboSelected = [];
  document.querySelectorAll('[data-ttype]').forEach(b => b.classList.toggle('active', b.dataset.ttype === type));
  renderTableTab();
}

function renderTableTab() {
  const tables = state.currentTableType === 'spark' ? SPARK_TABLES : SPECIFIC_TABLES;
  const names = Object.keys(tables);

  // Combo pills
  document.getElementById('combo-pills').innerHTML = names.map(n =>
    `<button class="combo-pill ${state.comboSelected.includes(n)?'selected':''}" onclick="toggleCombo('${n}')">${n}</button>`
  ).join('');

  // Combo button
  const btn = document.getElementById('combo-roll-btn');
  btn.disabled = state.comboSelected.length === 0;
  btn.textContent = `Roll ${state.comboSelected.length>1?'Combo ':''} (${state.comboSelected.length || '—'})`;

  // Grid
  document.getElementById('table-grid').innerHTML = names.map(n =>
    `<button class="table-grid-btn" onclick="rollSingle('${n}')">${n}</button>`
  ).join('');
}

function toggleCombo(name) {
  const idx = state.comboSelected.indexOf(name);
  if (idx >= 0) state.comboSelected.splice(idx, 1);
  else if (state.comboSelected.length < 3) state.comboSelected.push(name);
  renderTableTab();
}

function rollCombo() {
  if (!state.comboSelected.length) return;
  const tables = state.currentTableType === 'spark' ? SPARK_TABLES : SPECIFIC_TABLES;
  const results = state.comboSelected.map(name => {
    const r = rollD66();
    return { table: name, d66: r.display, result: tables[name][r.key] || "Reroll" };
  });
  showTableResults(results);
  const detail = results.map(r => `${r.table}: [${r.d66}] → ${r.result}`).join(' + ');
  addJournal({ type: results.length > 1 ? 'Combo Table Roll' : 'Table Roll', detail });
}

function rollSingle(name) {
  const tables = state.currentTableType === 'spark' ? SPARK_TABLES : SPECIFIC_TABLES;
  const r = rollD66();
  const result = tables[name][r.key] || "Reroll";
  state.comboSelected = [name];
  renderTableTab();
  showTableResults([{ table: name, d66: r.display, result }]);
  addJournal({ type: 'Table Roll', detail: `${name}: [${r.d66}] → ${result}` });
}

function showTableResults(results) {
  document.getElementById('table-results').innerHTML = `
    <div class="result-box" style="text-align:left;margin-top:0;margin-bottom:16px">
      ${results.map(r => `
        <div class="table-result-row">
          <span class="result-dice" style="width:44px;height:44px;font-size:20px;flex-shrink:0">${r.d66}</span>
          <div>
            <div class="table-result-name">${r.table}</div>
            <div class="table-result-val">${esc(r.result)}</div>
          </div>
        </div>
      `).join('')}
    </div>`;
}

// ══════════════════════════════════════════════════════════════════════════════
// JOURNAL
// ══════════════════════════════════════════════════════════════════════════════

function addJournal(entry) {
  entry.id = nextId();
  entry.time = ts();
  state.journal.push(entry);
  saveState();
  // Update tab badge
  document.querySelector('[data-tab="journal"]').textContent = `Journal (${state.journal.length})`;
}

function renderJournal() {
  const list = document.getElementById('journal-list');
  const count = document.getElementById('journal-count');
  count.textContent = `${state.journal.length} entries`;

  if (!state.journal.length) {
    list.innerHTML = '<div class="journal-empty">No entries yet. Roll some dice!</div>';
    return;
  }
  list.innerHTML = state.journal.map(e => `
    <div class="journal-entry">
      <div class="journal-header">
        <span class="journal-type">${esc(e.type)}</span>
        <span class="journal-time">${e.time}</span>
      </div>
      ${e.character ? `<div class="journal-char">Character: ${esc(e.character)}</div>` : ''}
      ${e.question ? `<div class="journal-question">"${esc(e.question)}"</div>` : ''}
      <div class="journal-detail">${esc(e.detail)}</div>
      ${e.obvious ? `<div class="journal-ooo">Obvious: ${esc(e.obvious)}${e.option?' · Option: '+esc(e.option):''}${e.odd?' · Odd: '+esc(e.odd):''}</div>` : ''}
      ${e.note ? `<div class="journal-note">★ ${esc(e.note)}</div>` : ''}
    </div>
  `).join('');
  // Scroll to bottom
  list.lastElementChild?.scrollIntoView({behavior:'smooth'});
}

function clearJournal() {
  if (!confirm('Clear all journal entries?')) return;
  state.journal = [];
  state.entryId = 0;
  saveState();
  renderJournal();
  document.querySelector('[data-tab="journal"]').textContent = 'Journal';
}

// ══════════════════════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════════════════════

loadState();
renderCharacters();
renderTableTab();
if (state.journal.length) {
  document.querySelector('[data-tab="journal"]').textContent = `Journal (${state.journal.length})`;
}
</script>
